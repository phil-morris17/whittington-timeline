<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whittington Timeline</title>
<style>
body {font-family: Georgia, serif; margin:0; background:#f6f1e8;}
header {text-align:center; padding:20px; background:#e8dfd1;}
main {display:flex; gap:20px; padding:20px;}
#timeline {flex:2;}
#bio {flex:1; background:#fff; padding:15px; border-radius:10px;}
.bar {padding:8px; margin:5px 0; background:#d8cbb5; cursor:pointer;}
.bar:hover {background:#c8b9a4;}
</style>
</head>
<body>

<header>
<h1>Whittington History Hub</h1>
<p>Interactive timeline (auto-loaded from dataset)</p>
</header>

<main>
<div id="timeline"></div>
<div id="bio">
<h3>Click a person</h3>
<p>Biography will appear here</p>
</div>
</main>

<script>
fetch("whittington_timeline_autoload_dataset.csv")
.then(r=>r.text())
.then(text=>{
const rows = text.split("\n").slice(1);

const timeline = document.getElementById("timeline");
const bio = document.getElementById("bio");

rows.forEach(row=>{
const cols = row.split(",");
if(cols.length < 6) return;

const name = cols[1];
const start = cols[2];
const end = cols[3];
const description = cols[6];

const div = document.createElement("div");
div.className = "bar";
div.innerText = name + " (" + start + "–" + end + ")";

div.onclick = ()=>{
bio.innerHTML = "<h3>"+name+"</h3><p>"+description+"</p>";
};

timeline.appendChild(div);
});
});
</script>

</body>
</html>
